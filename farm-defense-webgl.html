<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>농작물을 지켜라! | WebGL</title>
  <meta name="description" content="유니티 WebGL 게임 '농작물을 지켜라!'를 브라우저에서 바로 플레이하세요." />
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <style>
    :root {
      --bg: #050507;
      --panel: #171717;
      --border: #2f2f36;
      --text: #f8f8f8;
      --muted: #a5a5a5;
      --accent: #d69c29;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #222 0%, #050507 52%, #000 100%);
      min-height: 100vh;
    }
    .container {
      width: min(1120px, 100% - 32px);
      margin: 0 auto;
      padding: 22px 0 40px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .home-link {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .home-link:hover { color: var(--text); border-bottom-color: var(--accent); }
    h1 { margin: 6px 0 4px; font-size: clamp(1.4rem, 3vw, 2rem); }
    .subtitle { color: var(--muted); margin: 0 0 16px; }
    .game-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    #unity-container { width: 100%; }
    #unity-canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      background: #000;
      border: 1px solid #333;
      display: block;
    }
    .hint {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .btn {
      margin-top: 12px;
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      color: #181818;
      background: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    .footer-note { margin-top: 14px; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <a class="home-link" href="/">← 메인으로 돌아가기</a>
    </div>

    <h1>농작물을 지켜라! (WebGL)</h1>
    <p class="subtitle">브라우저에서 바로 플레이하는 유니티 WebGL 버전입니다.</p>

    <section class="game-shell">
      <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1" aria-label="농작물을 지켜라! WebGL 게임 화면"></canvas>
      </div>
      <div class="hint" id="unity-status">게임 로더를 준비 중입니다...</div>
      <a class="btn" href="#" id="fullscreen-btn">전체화면</a>
      <p class="footer-note">※ 권장 구조는 <code>/games/farm-defense/*</code>이며, 기존 <code>./Build</code> 경로도 자동 탐색합니다.</p>
    </section>
  </main>

  <script>
    const roots = ["/games/farm-defense", "."];

    const buildVariants = [
      {
        loader: "Build.loader.js",
        data: "Build.data",
        framework: "Build.framework.js",
        code: "Build.wasm"
      },
      {
        loader: "Build.loader.js.br",
        data: "Build.data.br",
        framework: "Build.framework.js.br",
        code: "Build.wasm.br"
      }
    ];

    function createConfig(gameRoot, variant) {
      const buildUrl = `${gameRoot}/Build`;
      return {
        loaderUrl: `${buildUrl}/${variant.loader}`,
        config: {
          dataUrl: `${buildUrl}/${variant.data}`,
          frameworkUrl: `${buildUrl}/${variant.framework}`,
          codeUrl: `${buildUrl}/${variant.code}`,
          streamingAssetsUrl: `${gameRoot}/StreamingAssets`,
          companyName: "K-magpie",
          productName: "농작물을 지켜라!",
          productVersion: "1.0"
        }
      };
    }

    const canvas = document.querySelector("#unity-canvas");
    const status = document.querySelector("#unity-status");
    const fullscreenBtn = document.querySelector("#fullscreen-btn");

    function setStatus(message) {
      status.textContent = message;
    }

    function loadFromRoot(index = 0, variantIndex = 0) {
      if (variantIndex >= buildVariants.length) {
        setStatus("지원 가능한 Build 파일 형식을 모두 시도했지만 로더를 찾지 못했습니다.");
        return;
      }

      if (index >= roots.length) {
        loadFromRoot(0, variantIndex + 1);
        return;
      }

      const root = roots[index];
      const variant = buildVariants[variantIndex];
      const { loaderUrl, config } = createConfig(root, variant);
      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        if (typeof createUnityInstance !== "function") {
          setStatus(`로더는 찾았지만 Unity 인스턴스 초기화에 실패했습니다. (${root} 경로)`);
          return;
        }

        createUnityInstance(canvas, config, (progress) => {
          setStatus(`로딩 중... ${Math.round(progress * 100)}%`);
        }).then((unityInstance) => {
          setStatus(`로딩 완료! (${root} / ${variant.loader})`);
          fullscreenBtn.addEventListener("click", (e) => {
            e.preventDefault();
            unityInstance.SetFullscreen(1);
          });
        }).catch((message) => {
          setStatus("게임 실행 실패: " + message);
        });
      };

      script.onerror = () => {
        setStatus(`로더 탐색 중... (${root} / ${variant.loader} 실패)`);
        script.remove();
        loadFromRoot(index + 1, variantIndex);
      };

      document.body.appendChild(script);
    }

    loadFromRoot();
  </script>
</body>
</html>
